services:

  # ============================================================
  # NETWORKING
  # Tailscale runs on the host, not in Docker.
  # Install: curl -fsSL https://tailscale.com/install.sh | sh
  # Login:   sudo tailscale up
  # Funnel:  sudo tailscale funnel --bg 80
  # ============================================================

  # ============================================================
  # REVERSE PROXY
  # ============================================================

  caddy:
    image: caddy:latest
    container_name: caddy
    network_mode: host
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: unless-stopped

  # ============================================================
  # MEDIA
  # ============================================================

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_DIR:-/srv/media}:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-}
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

