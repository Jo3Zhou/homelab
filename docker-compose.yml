# ============================================================
# HOMELAB DOCKER COMPOSE FILES
# ThinkCentre i3-9100 + Synology NAS
# ============================================================
# Directory structure:
# /opt/homelab/
# ├── .env                    ← global secrets (never commit)
# ├── .gitignore
# ├── caddy/
# │   ├── docker-compose.yml
# │   ├── Dockerfile          ← custom build with Cloudflare DNS plugin
# │   ├── Caddyfile
# │   └── data/               ← certs and state (gitignored)
# ├── jellyfin/
# │   └── docker-compose.yml
# ├── immich/
# │   ├── docker-compose.yml
# │   └── .env
# ├── nextcloud/
# │   ├── docker-compose.yml
# │   └── .env
# └── vaultwarden/
#     └── docker-compose.yml
# ============================================================


# ============================================================
# SETUP: Run these commands before anything else
# ============================================================
# 1. docker network create proxy
# 2. mkdir -p /mnt/nas/{media,photos,documents,backups}
# 3. mount -a  (after setting up /etc/fstab)
# 4. Copy each section below into its own docker-compose.yml
# 5. Create .env files from .env.example templates
# 6. Start Caddy first, then everything else


# ============================================================
# /opt/homelab/.gitignore
# ============================================================
# **/.env
# **/certs/
# **/cache/
# **/logs/
# **/pgdata/
# **/dbdata/
# **/data/


# ============================================================
# /opt/homelab/.env  (global, never commit to git)
# ============================================================
# CF_API_TOKEN=your_cloudflare_api_token        ← used by Caddy for DNS-01 TLS certs
# CF_TUNNEL_TOKEN=your_cloudflare_tunnel_token  ← used by cloudflared (Zero Trust > Tunnels)
# DOMAIN=yourdomain.com
# ACME_EMAIL=you@email.com


# ============================================================
# FILE: /opt/homelab/caddy/docker-compose.yml
# ============================================================
# Must be started FIRST before all other services.
# Uses a custom build to include the Cloudflare DNS plugin
# for automatic TLS via DNS-01 challenge (no open ports needed
# for cert issuance).
# ============================================================

---
services:
  caddy:
    build: .                            # builds from caddy/Dockerfile
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"                   # HTTP/3
    networks:
      - proxy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data                    # certs and state (gitignored)
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}

networks:
  proxy:
    external: true

# ============================================================
# FILE: /opt/homelab/caddy/Dockerfile
# ============================================================
# Builds Caddy with the Cloudflare DNS plugin.
# Rebuild when updating Caddy: docker compose build --no-cache
# ============================================================
#
# FROM caddy:builder AS builder
# RUN xcaddy build --with github.com/caddy-dns/cloudflare
#
# FROM caddy:latest
# COPY --from=builder /usr/bin/caddy /usr/bin/caddy

# ============================================================
# FILE: /opt/homelab/caddy/Caddyfile
# ============================================================
# Snippet used by all sites to issue certs via Cloudflare DNS.
# This works even if ports 80/443 are not forwarded on your
# router — DNS-01 challenge only needs outbound internet.
# ============================================================
#
# (cloudflare_tls) {
#     tls {
#         dns cloudflare {env.CF_API_TOKEN}
#         resolvers 1.1.1.1
#     }
# }
#
# # Jellyfin — media server
# jellyfin.{env.DOMAIN} {
#     import cloudflare_tls
#     reverse_proxy jellyfin:8096
# }
#
# # Immich — photo backup
# photos.{env.DOMAIN} {
#     import cloudflare_tls
#     reverse_proxy immich-server:2283
# }
#
# # Nextcloud — file storage
# cloud.{env.DOMAIN} {
#     import cloudflare_tls
#     reverse_proxy nextcloud:80
#     redir /.well-known/carddav /remote.php/dav 301
#     redir /.well-known/caldav  /remote.php/dav 301
#     header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
# }
#
# # Vaultwarden — password manager
# vault.{env.DOMAIN} {
#     import cloudflare_tls
#     reverse_proxy vaultwarden:80
# }
#
# # Grafana — monitoring (Tailscale-only, not in Cloudflare Tunnel)
# grafana.{env.DOMAIN} {
#     import cloudflare_tls
#     reverse_proxy grafana:3000
# }


# ============================================================
# FILE: /opt/homelab/jellyfin/docker-compose.yml
# ============================================================
# Films and media server
# Media lives on NAS at /mnt/nas/media
# ============================================================

---
services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - proxy
    # iGPU passthrough for hardware transcoding (i3-9100 Intel UHD 630)
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - ./config:/config                  # config on local SSD (fast)
      - ./cache:/cache                    # cache on local SSD
      - /mnt/nas/media:/media:ro          # media on NAS (read only)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London

networks:
  proxy:
    external: true


# ============================================================
# FILE: /opt/homelab/immich/docker-compose.yml
# ============================================================
# Photo backup - replaces iCloud
# Photos stored on NAS at /mnt/nas/photos
# ============================================================

---
services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: unless-stopped
    networks:
      - proxy
      - immich-internal
    volumes:
      - /mnt/nas/photos:/usr/src/app/upload   # photos on NAS
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    depends_on:
      - immich-redis
      - immich-postgres

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich_ml
    restart: unless-stopped
    networks:
      - immich-internal
    volumes:
      - immich-model-cache:/cache
    env_file: .env

  immich-redis:
    image: redis:alpine
    container_name: immich_redis
    restart: unless-stopped
    networks:
      - immich-internal

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    networks:
      - immich-internal
    volumes:
      - ./pgdata:/var/lib/postgresql/data   # database on local SSD (fast)
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

volumes:
  immich-model-cache:

networks:
  proxy:
    external: true
  immich-internal:


# ============================================================
# FILE: /opt/homelab/immich/.env
# ============================================================
# DB_HOSTNAME=immich-postgres
# DB_USERNAME=immich
# DB_PASSWORD=changeme_strong_password
# DB_DATABASE_NAME=immich
# REDIS_HOSTNAME=immich-redis


# ============================================================
# FILE: /opt/homelab/nextcloud/docker-compose.yml
# ============================================================
# File sharing - replaces iCloud Drive / Dropbox
# User files stored on NAS at /mnt/nas/documents
# ============================================================

---
services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - proxy
      - nextcloud-internal
    volumes:
      - ./config:/var/www/html              # config on local SSD
      - /mnt/nas/documents:/var/www/html/data  # user files on NAS
    env_file: .env
    depends_on:
      - nextcloud-db
      - nextcloud-redis

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud_db
    restart: unless-stopped
    networks:
      - nextcloud-internal
    volumes:
      - ./dbdata:/var/lib/mysql             # database on local SSD (fast)
    env_file: .env

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: unless-stopped
    networks:
      - nextcloud-internal

networks:
  proxy:
    external: true
  nextcloud-internal:


# ============================================================
# FILE: /opt/homelab/nextcloud/.env
# ============================================================
# MYSQL_HOST=nextcloud-db
# MYSQL_DATABASE=nextcloud
# MYSQL_USER=nextcloud
# MYSQL_PASSWORD=changeme_strong_password
# MYSQL_ROOT_PASSWORD=changeme_root_password
# NEXTCLOUD_ADMIN_USER=admin
# NEXTCLOUD_ADMIN_PASSWORD=changeme_admin_password
# REDIS_HOST=nextcloud-redis


# ============================================================
# FILE: /opt/homelab/vaultwarden/docker-compose.yml
# ============================================================
# Password manager - replaces iCloud Keychain / LastPass
# ============================================================

---
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./data:/data                        # vault data on local SSD
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - SIGNUPS_ALLOWED=false               # disable after creating accounts
      - TZ=Europe/London

networks:
  proxy:
    external: true


# ============================================================
# FILE: /opt/homelab/cloudflared/docker-compose.yml
# ============================================================
# Cloudflare Tunnel — exposes selected services publicly
# without opening any ports on your router.
#
# Setup:
#   1. Go to https://one.dash.cloudflare.com
#      → Networks → Tunnels → Create a tunnel → Docker
#   2. Copy the token and add it to /opt/homelab/.env as CF_TUNNEL_TOKEN
#   3. In the tunnel dashboard, add Public Hostnames:
#        jellyfin.yourdomain.com  → http://jellyfin:8096
#        photos.yourdomain.com    → http://immich-server:2283
#        cloud.yourdomain.com     → http://nextcloud:80
#        vault.yourdomain.com     → http://vaultwarden:80
#      Leave services you want private (grafana) out.
# ============================================================

---
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    networks:
      - proxy
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}

networks:
  proxy:
    external: true


# ============================================================
# FILE: /opt/homelab/monitoring/docker-compose.yml
# ============================================================
# Grafana + Prometheus - see what your server is doing
# ============================================================

---
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - proxy
      - monitoring-internal
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - proxy
      - monitoring-internal
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme_grafana_password
      - TZ=Europe/London

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    networks:
      - monitoring-internal
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

volumes:
  prometheus-data:
  grafana-data:

networks:
  proxy:
    external: true
  monitoring-internal:


