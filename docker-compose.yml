# ============================================================
# FILE: /opt/homelab/scripts/start-all.sh
# ============================================================

#!/bin/bash
set -e
cd /opt/homelab

echo "Building and starting Caddy..."
docker compose -f caddy/docker-compose.yml build
docker compose -f caddy/docker-compose.yml up -d

echo "Starting Cloudflare Tunnel..."
docker compose -f cloudflared/docker-compose.yml up -d

echo "Starting Jellyfin..."
docker compose -f jellyfin/docker-compose.yml up -d

echo "Starting Immich..."
docker compose -f immich/docker-compose.yml up -d

echo "Starting Nextcloud..."
docker compose -f nextcloud/docker-compose.yml up -d

echo "Starting Vaultwarden..."
docker compose -f vaultwarden/docker-compose.yml up -d

echo "Starting Monitoring..."
docker compose -f monitoring/docker-compose.yml up -d

echo "All services started!"
docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"


# ============================================================
# FILE: /opt/homelab/scripts/backup-dbs.sh
# ============================================================

#!/bin/bash
set -e
BACKUP_DIR=/mnt/nas/backups/databases
DATE=$(date +%F)
mkdir -p $BACKUP_DIR

echo "Backing up Immich database..."
docker exec immich_postgres pg_dumpall -U immich | \
  gzip > $BACKUP_DIR/immich-$DATE.sql.gz

echo "Backing up Nextcloud database..."
docker exec nextcloud_db mysqldump \
  -u root -p${MYSQL_ROOT_PASSWORD} nextcloud | \
  gzip > $BACKUP_DIR/nextcloud-$DATE.sql.gz

# Keep last 30 days only
find $BACKUP_DIR -name "*.sql.gz" -mtime +30 -delete

echo "Database backup complete: $DATE"


# ============================================================
# CRON JOB - add to /etc/cron.d/homelab
# ============================================================
# Run DB backup every night at 3am
# 0 3 * * * root /opt/homelab/scripts/backup-dbs.sh >> /var/log/homelab-backup.log 2>&1
