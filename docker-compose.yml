services:

  # ============================================================
  # NETWORKING
  # Tailscale runs on the host, not in Docker.
  # Install: curl -fsSL https://tailscale.com/install.sh | sh
  # Login:   sudo tailscale up
  # Funnel:  sudo tailscale funnel --bg 80
  # ============================================================

  # ============================================================
  # REVERSE PROXY
  # ============================================================

  caddy:
    image: caddy:latest
    container_name: caddy
    network_mode: host
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: unless-stopped

  # ============================================================
  # MEDIA
  # ============================================================

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_DIR:-/srv/media}:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-}
    group_add:
      - "105"
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  # ============================================================
  # FILES
  # ============================================================

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    network_mode: host
    volumes:
      - filebrowser-config:/config
      - filebrowser-db:/database
      - ${FILES_DIR:-/srv}:/srv
    environment:
      - FB_BASEURL=/files
      - FB_PORT=8081
    restart: unless-stopped

  # ============================================================
  # DASHBOARD
  # ============================================================

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    network_mode: host
    environment:
      - PORT=3001
      - HOMEPAGE_ALLOWED_HOSTS=100.90.143.17:8888,localhost:3001
    volumes:
      - ./homepage:/app/config
    restart: unless-stopped

  # ============================================================
  # MONITORING
  # ============================================================

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    network_mode: host
    environment:
      - PORT=3002
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

  # ============================================================
  # PLACEHOLDER: DOWNLOAD
  # e.g. qBittorrent, Transmission, Aria2
  # ============================================================

  # qbittorrent:
  #   image: lscr.io/linuxserver/qbittorrent:latest
  #   container_name: qbittorrent
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - WEBUI_PORT=8090
  #   ports:
  #     - "8090:8090"
  #     - "6881:6881"
  #     - "6881:6881/udp"
  #   volumes:
  #     - qbittorrent-config:/config
  #     - ${DOWNLOAD_DIR:-/srv/downloads}:/downloads
  #   restart: unless-stopped

  # ============================================================
  # AUTOMATION
  # ============================================================

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - RADARR__SERVER__URLBASE=/radarr
    volumes:
      - radarr-config:/config
      - ${MEDIA_DIR:-/srv/media}/Movies:/movies
      - ${DOWNLOAD_DIR:-/srv/downloads}:/downloads
    restart: unless-stopped

  # prowlarr:
  #   image: lscr.io/linuxserver/prowlarr:latest
  #   container_name: prowlarr
  #   network_mode: host
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - PROWLARR__SERVER__URLBASE=/prowlarr
  #   volumes:
  #     - prowlarr-config:/config
  #   restart: unless-stopped

  # ============================================================
  # PLACEHOLDER: PASSWORD MANAGER
  # e.g. Vaultwarden (Bitwarden compatible)
  # ============================================================

  # vaultwarden:
  #   image: vaultwarden/server:latest
  #   container_name: vaultwarden
  #   ports:
  #     - "8888:80"
  #   volumes:
  #     - vaultwarden-data:/data
  #   environment:
  #     - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-}
  #   restart: unless-stopped

  # ============================================================
  # FILE SHARING
  # ============================================================

  pingvin-share:
    image: stonith404/pingvin-share:latest
    container_name: pingvin-share
    network_mode: host
    environment:
      - TRUST_PROXY=true
      - BASE_URL=http://localhost/share
    volumes:
      - pingvin-data:/opt/app/backend/data
      - pingvin-images:/opt/app/frontend/public/img
    restart: unless-stopped

  # ============================================================
  # PLACEHOLDER: NOTES / WIKI
  # e.g. Obsidian LiveSync backend, Wiki.js, Outline
  # ============================================================

  # ============================================================
  # PLACEHOLDER: SMART HOME
  # e.g. Home Assistant
  # ============================================================

  # homeassistant:
  #   image: ghcr.io/home-assistant/home-assistant:stable
  #   container_name: homeassistant
  #   network_mode: host
  #   volumes:
  #     - homeassistant-config:/config
  #     - /etc/localtime:/etc/localtime:ro
  #   restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  jellyfin-config:
  jellyfin-cache:
  filebrowser-config:
  filebrowser-db:
  radarr-config:
  pingvin-data:
  pingvin-images:
  uptime-kuma-data:
